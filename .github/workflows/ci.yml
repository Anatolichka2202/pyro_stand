name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test (Qt6 / Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev \
            libqt6serialport6-dev \
            ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build all targets
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V
