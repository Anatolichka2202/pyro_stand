<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }
    .win {
      display: flex;
      flex-direction: column;
      width: 1280px;
      height: 800px;
      padding: 16px 24px;
      gap: 16px;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ───────── TOP ROW: Timer (left) + Controls (right) ───────── */
    .top {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    /* Timer block */
    .timer-block {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .timer-caption {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #8b949e;
      text-transform: uppercase;
    }
    .timer-value {
      font-size: 44px;
      font-weight: 600;
      color: #e3b341;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .phase-line {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #e3b341;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .phase-line .blink { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .next-event {
      font-size: 12px;
      color: #8b949e;
    }
    .next-event b { color: #e6edf3; font-weight: 600; }

    /* Status strip inside timer block */
    .status-strip {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #e6edf3;
    }
    .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #3fb950; box-shadow: 0 0 6px rgba(63,185,80,0.5); }
    .dot.red { background: #f85149; }

    /* Controls */
    .controls {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }
    button {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    button .ic { width: 16px; text-align: center; color: #8b949e; }
    button:hover { border-color: #58a6ff; background: #1c2330; }
    button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; font-weight: 600; }
    button.primary .ic { color: #cce0ff; }
    button.primary:hover { background: #388bfd; }
    button.danger:hover { border-color: #f85149; }
    button.danger:hover .ic { color: #f85149; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ───────── TIMELINE (T18) ───────── */
    .timeline-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8b949e;
    }
    .tl {
      position: relative;
      height: 64px;
      padding: 0 24px;
    }
    .tl-axis {
      position: absolute;
      left: 24px; right: 24px;
      top: 30px;
      height: 2px;
      background: #30363d;
    }
    .tl-fill {
      position: absolute;
      left: 24px;
      top: 30px;
      height: 2px;
      background: #58a6ff;
      width: 0;
    }
    .tl-fill.run { animation: fill 30s linear forwards; }
    @keyframes fill { to { width: calc(100% - 48px); } }

    .tl-t0 {
      position: absolute;
      top: 8px;
      width: 2px;
      height: 46px;
      background: #f85149;
      transform: translateX(-1px);
    }
    .tl-t0-label {
      position: absolute;
      top: -4px;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 700;
      color: #f85149;
      letter-spacing: 0.1em;
    }

    .tl-ev {
      position: absolute;
      top: 22px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: default;
    }
    .tl-tick {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0d1117;
      border: 2px solid #58a6ff;
    }
    .tl-ev.ok .tl-tick { background: #3fb950; border-color: #3fb950; }
    .tl-ev.fail .tl-tick { background: #f85149; border-color: #f85149; }
    .tl-num {
      position: absolute;
      top: -16px;
      font-size: 10px;
      font-weight: 600;
      color: #8b949e;
    }
    .tl-time {
      position: absolute;
      top: 14px;
      font-size: 9px;
      color: #8b949e;
      white-space: nowrap;
    }
    .tl-playhead {
      position: absolute;
      top: 4px;
      width: 2px;
      height: 54px;
      background: #58a6ff;
      box-shadow: 0 0 10px rgba(88,166,255,0.8);
      transform: translateX(-1px);
      
</x-dc>
</body>
</html>
